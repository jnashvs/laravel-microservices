version: "3.8"

services:
  # ----------------------------
  # API Gateway
  # ----------------------------
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:80"
    volumes:
      - ./api-gateway:/var/www/html
      - ./api-gateway/bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
      APP_KEY: ${API_GATEWAY_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      TICKET_SERVICE_URL: http://ticket-service:80
      NOTIFICATION_SERVICE_URL: http://notification-service:80
      AUTH_SERVICE_URL: http://auth-service:80
    depends_on:
      auth-service:
        condition: service_healthy
      ticket-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - microservices

  # ----------------------------
  # Auth Service
  # ----------------------------
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8010:80"
    volumes:
      - ./auth-service:/var/www/html
      - ./auth-service/bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_NAME: AuthService
      APP_ENV: local
      APP_KEY: ${AUTH_SERVICE_APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://auth-service
      DB_CONNECTION: mysql
      DB_HOST: auth-db
      DB_PORT: 3306
      DB_DATABASE: auth_service
      DB_USERNAME: user
      DB_PASSWORD: password
      REDIS_HOST: auth-redis
      CACHE_STORE: redis
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      PASSPORT_PASSWORD_CLIENT_ID: ${PASSPORT_PASSWORD_CLIENT_ID}
      PASSPORT_PASSWORD_CLIENT_SECRET: ${PASSPORT_PASSWORD_CLIENT_SECRET}
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - microservices

  # ----------------------------
  # Ticket Service
  # ----------------------------
  ticket-service:
    build: ./ticket-service
    container_name: ticket-service
    ports:
      - "8100:80"
    volumes:
      - ./ticket-service:/var/www/html
      - ./ticket-service/bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
      APP_KEY: ${TICKET_SERVICE_APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: ticket-db
      DB_PORT: 3306
      DB_DATABASE: tickets
      DB_USERNAME: user
      DB_PASSWORD: ${TICKET_DB_PASSWORD}
      REDIS_HOST: redis
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    depends_on:
      ticket-db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - microservices

  # ----------------------------
  # Notification Service
  # ----------------------------
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8200:80"
    volumes:
      - ./notification-service:/var/www/html
      - ./notification-service/bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
      APP_KEY: ${NOTIFICATION_SERVICE_APP_KEY}
      REDIS_HOST: redis
      CACHE_STORE: file
      SESSION_DRIVER: file
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "php artisan route:list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - microservices

  # ----------------------------
  # Databases & Redis
  # ----------------------------
  auth-db:
    image: mysql:8.0
    container_name: auth-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: auth_service
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - microservices

  ticket-db:
    image: mysql:8.0
    container_name: ticket-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tickets
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - ticket-db-data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-ppassword"]
      interval: 10s
      retries: 5
    networks:
      - microservices

  auth-redis:
    image: redis:alpine
    container_name: auth-redis
    ports:
      - "6380:6379"
    networks:
      - microservices

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - microservices

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    networks:
      - microservices

  # ----------------------------
  # Observability Stack
  # ----------------------------
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - microservices

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - microservices

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - loki
    networks:
      - microservices

networks:
  microservices:
    driver: bridge

volumes:
  ticket-db-data:
  auth-db-data:
