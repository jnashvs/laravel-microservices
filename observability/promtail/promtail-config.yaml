server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_wait_time: 3s
      - regex:
          expression: '^(?P<docker_timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<content>\{.*\})$'
      - json:
          source: content
          expressions:
            message: message
            level: level_name
            service: context.service
            request_id: context.request_id
            timestamp: datetime
      - labels:
          service:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: message
